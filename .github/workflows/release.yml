name: Build and Release

on:
  workflow_dispatch:  # Manual trigger
  release:
    types: [published]  # Also trigger on GitHub releases

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: super-metroid-editor-macos
            path: desktopApp/build/compose/binaries/main/dmg/*.dmg
          - os: windows-latest
            artifact: super-metroid-editor-windows
            path: desktopApp/build/compose/binaries/main/msi/*.msi
          - os: ubuntu-latest
            artifact: super-metroid-editor-linux
            path: desktopApp/build/compose/binaries/main/deb/*.deb
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew :shared:jvmTest :desktopApp:jvmTest
        shell: bash

      - name: Build application
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  attach-to-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          for f in super-metroid-editor-macos/*.dmg; do
            [ -f "$f" ] && cp "$f" release-assets/SuperMetroidEditor-macOS.dmg
          done

          for f in super-metroid-editor-windows/*.msi; do
            [ -f "$f" ] && cp "$f" release-assets/SuperMetroidEditor-Windows.msi
          done

          for f in super-metroid-editor-linux/*.deb; do
            [ -f "$f" ] && cp "$f" release-assets/SuperMetroidEditor-Linux.deb
          done

          ls -lh release-assets/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
